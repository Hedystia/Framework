name: Continuous Integration

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - master

env:
  GITHUB_REPO: 'Hedystia/Hedystia'
  GIT_SSL_NO_VERIFY: 'true'

jobs:
  status_pending:
    runs-on: docker
    steps:
      - name: Send Pending Status
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"pending", "context":"CI", "description":"Provisioning local services and running tests"}'

  test_suite:
    needs: status_pending
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        command: ['test', 'test:build', 'test:stress']
    container:
      image: oven/bun:latest
    services:
      db:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: 'root_password'
          MYSQL_DATABASE: 'test_db'
          MYSQL_USER: 'dev_user'
          MYSQL_PASSWORD: 'dev_password'
        healthcheck:
          test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
          interval: 10s
          timeout: 5s
          retries: 5
      s3:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: 'minio_admin'
          MINIO_ROOT_PASSWORD: 'minio_password'
        options: server /data
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
          interval: 10s
          timeout: 5s
          retries: 5
    env:
      MYSQL_DATABASE: 'test_db'
      MYSQL_USER: 'dev_user'
      MYSQL_PASSWORD: 'dev_password'
      MYSQL_HOST: 'db'
      S3_URL: 'http://s3:9000'
      S3_KEY_ID: 'minio_admin'
      S3_ACCESS_KEY: 'minio_password'
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git build-essential python3 curl
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: bun install
      - name: Run matrix command
        run: bun run ${{ matrix.command }}
        timeout-minutes: 15

  status_report:
    if: always()
    needs: test_suite
    runs-on: docker
    steps:
      - name: Report Failure
        if: ${{ contains(needs.test_suite.result, 'failure') || contains(needs.test_suite.result, 'cancelled') }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"error", "context":"CI", "description":"One or more tests failed"}'
      - name: Report Success
        if: ${{ !(contains(needs.test_suite.result, 'failure') || contains(needs.test_suite.result, 'cancelled')) }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"success", "context":"CI", "description":"All checks passed"}'
