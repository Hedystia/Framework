name: Continuous Integration

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - main

env:
  GITHUB_REPO: "Hedystia/Hedystia"

jobs:
  status-pending:
    runs-on: docker
    steps:
      - run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"pending", "context":"Forgejo CI", "description":"Running test matrix"}'

  test-suite:
    needs: status-pending
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        command: ["test", "test:build", "test:stress"]
    container:
      image: oven/bun:latest
    steps:
      - uses: actions/checkout@v4
      - run: bun install
      - run: bun run ${{ matrix.command }}

  status-report:
    if: always()
    needs: test-suite
    runs-on: docker
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"error", "context":"Forgejo CI", "description":"One or more tests failed"}'
      - if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"success", "context":"Forgejo CI", "description":"All checks passed"}'
