name: Continuous Integration

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - master

env:
  GITHUB_REPO: "Hedystia/Hedystia"
  GIT_SSL_NO_VERIFY: "true"

jobs:
  status-pending:
    runs-on: docker
    steps:
      - run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"pending", "context":"CI", "description":"Provisioning local services and running tests"}'

  test-suite:
    needs: status-pending
    runs-on: docker
    env:
      MYSQL_DATABASE: "test_db"
      MYSQL_USER: "dev_user"
      MYSQL_PASSWORD: "dev_password"
      MYSQL_HOST: "db"
      S3_URL: "http://s3:9000"
      S3_KEY_ID: "minio_admin"
      S3_ACCESS_KEY: "minio_password"
    strategy:
      fail-fast: false
      matrix:
        command: ["test", "test:build", "test:stress"]
    container:
      image: oven/bun:latest
    services:
      db:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: "root_password"
          MYSQL_DATABASE: "test_db"
          MYSQL_USER: "dev_user"
          MYSQL_PASSWORD: "dev_password"
      s3:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: "minio_admin"
          MINIO_ROOT_PASSWORD: "minio_password"
          MINIO_DEFAULT_BUCKETS: "test-bucket"
    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: bun install
      - name: Run matrix command
        run: bun run ${{ matrix.command }}

  status-report:
    if: always()
    needs: test-suite
    runs-on: docker
    steps:
      - if: ${{ contains(needs.*.result, "failure") || contains(needs.*.result, "cancelled") }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"error", "context":"CI", "description":"One or more tests failed"}'
      - if: ${{ !(contains(needs.*.result, "failure") || contains(needs.*.result, "cancelled")) }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"success", "context":"CI", "description":"All checks passed"}'
