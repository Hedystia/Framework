name: 'Production Release'

on:
  push:
    tags:
      - 'v*'

env:
  GITHUB_REPO: 'Hedystia/Hedystia'
  GIT_SSL_NO_VERIFY: 'true'

jobs:
  status-pending:
    runs-on: docker
    steps:
      - run: |
          curl -L -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ secrets.GH_PAT }}' \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"pending", "context":"Release", "description":"Preparing release and publishing"}'

  publish-registry:
    needs: status-pending
    runs-on: docker
    container:
      image: 'oven/bun:latest'
    steps:
      - name: 'Install Git'
        run: |
          apt-get update
          apt-get install -y git
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
      - run: 'bun run release'
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-changelog:
    needs: publish-registry
    runs-on: docker
    container:
      image: 'oven/bun:latest'
    steps:
      - name: 'Install Git'
        run: |
          apt-get update
          apt-get install -y git
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0
      - run: 'bun install'
      - run: 'bunx changelogithub'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  status-report:
    if: always()
    needs: ['publish-registry', 'github-changelog']
    runs-on: docker
    steps:
      - if: ${{ contains(needs.publish-registry.result, 'failure') || contains(needs.github-changelog.result, 'failure') || contains(needs.publish-registry.result, 'cancelled') || contains(needs.github-changelog.result, 'cancelled') }}
        run: |
          curl -L -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ secrets.GH_PAT }}' \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"error", "context":"Release", "description":"Release process failed"}'
      - if: ${{ !(contains(needs.publish-registry.result, 'failure') || contains(needs.github-changelog.result, 'failure') || contains(needs.publish-registry.result, 'cancelled') || contains(needs.github-changelog.result, 'cancelled')) }}
        run: |
          curl -L -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ secrets.GH_PAT }}' \
            https://api.github.com/repos/${{ env.GITHUB_REPO }}/statuses/${{ forge.sha }} \
            -d '{"state":"success", "context":"Release", "description":"Release published successfully"}'
