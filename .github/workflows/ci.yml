name: Continuous Integration

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - master

jobs:
  test_suite:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        command: ['test', 'test:build', 'test:stress']
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: bun install
      - name: Run matrix command
        run: bun run ${{ matrix.command }}
        timeout-minutes: 15
