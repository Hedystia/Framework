name: Continuous Integration

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - master

jobs:
  test_suite:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        command: ['test', 'test:build', 'test:stress']
    services:
      db:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: 'root_password'
          MYSQL_DATABASE: 'test_db'
          MYSQL_USER: 'dev_user'
          MYSQL_PASSWORD: 'dev_password'
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      s3:
        image: adobe/s3mock:latest
        env:
          COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: 'test-bucket'
    env:
      MYSQL_DATABASE: 'test_db'
      MYSQL_USER: 'dev_user'
      MYSQL_PASSWORD: 'dev_password'
      MYSQL_HOST: 'db'
      S3_URL: 'http://s3:9090'
      S3_KEY_ID: 'any'
      S3_ACCESS_KEY: 'any'
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: bun install
      - name: Run matrix command
        run: bun run ${{ matrix.command }}
        timeout-minutes: 15
