name: Production Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-registry:
    runs-on: self-hosted
    permissions:
      id-token: write
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: bun install
      - name: Configure NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        run: bun run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

  github-changelog:
    needs: publish-registry
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: bun install
      - name: Generate Changelog
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
