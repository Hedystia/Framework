name: Production Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup NPM Auth
        run: |
          mkdir -p ~/.npm
          echo "_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
      - name: Copy License to Packages
        run: |
          cp license.md LICENSE
          for dir in Packages/*/; do
            cp LICENSE "$dir"
          done
      - name: Publish
        run: bun run release
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Generate Changelog
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
